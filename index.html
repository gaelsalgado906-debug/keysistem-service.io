<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gael Hub - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e2e8f0; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .slow-transition { transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <div id="section-intro" class="slow-transition text-center opacity-0 scale-95 blur-md">
        <h1 class="serif-font text-7xl md:text-9xl text-white italic mb-8 tracking-tighter">Gael Hub</h1>
        <button onclick="changeSection('section-intro', 'section-key')" class="px-12 py-3 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-all tracking-[0.3em] text-[10px] uppercase text-white shadow-2xl">
            Entrar
        </button>
    </div>

    <div id="section-key" class="hidden fixed inset-0 flex items-center justify-center">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md translate-y-10 opacity-0 slow-transition">
            <div class="text-center mb-8">
                <h2 class="text-xs font-bold tracking-[0.4em] uppercase text-zinc-500 mb-2">Seguridad</h2>
                <h3 class="text-2xl font-light text-white">Introduce la Key</h3>
            </div>
            <input type="text" id="key-input" placeholder="••••" 
                class="w-full bg-black/50 border border-white/5 rounded-2xl px-4 py-4 text-center text-2xl tracking-[0.3em] text-white focus:outline-none focus:border-white/20 transition-all mb-4">
            <button onclick="validateKey()" class="w-full py-4 bg-white text-black font-bold text-[10px] uppercase tracking-widest rounded-2xl hover:bg-zinc-200 transition-all">Verificar</button>
            <button onclick="showKey()" class="w-full mt-4 text-[9px] text-zinc-600 hover:text-white transition-colors uppercase tracking-[0.2em]">Obtener Key (890)</button>
        </div>
    </div>

    <div id="section-panel" class="hidden fixed inset-0 flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[3rem] w-full max-w-2xl translate-y-10 opacity-0 slow-transition">
            <div class="flex items-center justify-between mb-8 pb-6 border-b border-white/5">
                <h2 class="serif-font text-4xl text-white italic">Gael Hub</h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[9px] text-emerald-500 uppercase tracking-widest font-bold">Premium Activo</span>
                </div>
            </div>

            <div class="grid gap-4">
                <button onclick="openScriptBox('script1')" class="group flex items-center justify-between p-6 bg-white/[0.02] border border-white/5 rounded-3xl hover:bg-white/[0.04] transition-all">
                    <div class="text-left">
                        <p class="text-white font-medium">Script 1</p>
                        <p class="text-zinc-500 text-[10px]">Wind UI Library Base</p>
                    </div>
                    <div class="bg-white/5 p-2 rounded-xl group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round"/></svg>
                    </div>
                </button>

                <button onclick="openScriptBox('premium')" class="group flex items-center justify-between p-6 bg-gradient-to-br from-amber-500/10 to-transparent border border-amber-500/20 rounded-3xl hover:from-amber-500/20 transition-all">
                    <div class="text-left">
                        <p class="text-amber-400 font-bold flex items-center gap-2">
                            Script: Premium 
                            <span class="text-[8px] bg-amber-500 text-black px-1.5 py-0.5 rounded italic">V.IP</span>
                        </p>
                        <p class="text-zinc-400/60 text-[10px]">Jump Power & Infinite Jump Systems</p>
                    </div>
                    <div class="bg-amber-500/20 p-2 rounded-xl group-hover:rotate-12 transition-transform">
                        <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round"/></svg>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="modal-script" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="glass rounded-[2.5rem] w-full max-w-2xl overflow-hidden scale-90 opacity-0 transition-all duration-500" id="modal-content">
            <div class="flex justify-between items-center p-6 border-b border-white/5 bg-white/[0.02]">
                <span id="script-title" class="text-[10px] text-zinc-400 uppercase tracking-[0.3em]">Code Preview</span>
                <button onclick="closeScriptBox()" class="text-zinc-500 hover:text-white text-2xl transition-colors">&times;</button>
            </div>
            
            <div class="p-6">
                <textarea id="lua-code" readonly class="code-font w-full h-80 bg-black/50 text-sky-400/80 text-[11px] p-5 rounded-2xl border border-white/5 focus:outline-none resize-none leading-relaxed"></textarea>
                <button id="btn-copy" onclick="copyToClipboard()" class="w-full mt-6 py-4 bg-white hover:bg-zinc-200 text-black text-[10px] font-bold uppercase tracking-[0.2em] rounded-2xl transition-all shadow-xl">
                    Copiar Script
                </button>
            </div>
        </div>
    </div>

    <script>
        const scripts = {
            script1: `-- Cargando la Wind UI Library\nlocal WindUI = loadstring(game:HttpGet("https://tree-hub.vercel.app/api/UI/WindUI"))()\n\n-- Crear la ventana principal\nlocal Window = WindUI:CreateWindow({\n    Title = "gael hub", \n    Icon = "rbxassetid://10723343321", \n    Author = "Por TuNombre", \n    Folder = "Configuracion_WindUI" \n})\n\n-- Crear una pestaña (Tab)\nlocal MainTab = Window:Tab({\n    Title = "Principal",\n    Icon = "rbxassetid://10723343321"\n})\n\n-- Añadir secciones...\nlocal Section = MainTab:Section({\n    Title = "Funciones Básicas",\n    TextSize = 20\n})\n\nMainTab:Button({\n    Title = "Imprimir en Consola",\n    Callback = function()\n        print("¡El botón funciona!")\n    end\n})`,
            premium: `-- [[ WIND UI LIBRARY - SCRIPT BASE ]] --\n\nlocal WindUI = loadstring(game:HttpGet("https://tree-hub.vercel.app/api/UI/WindUI"))()\n\n-- Creación de la Ventana Principal\nlocal Window = WindUI:CreateWindow({\n    Title = "Premium Hub",\n    Icon = "rbxassetid://10723343321",\n    Author = "By Gemini",\n    Folder = "WindUI_Configs"\n})\n\n-- [[ PESTAÑA PRINCIPAL ]] --\nlocal MainTab = Window:Tab({\n    Title = "Inicio",\n    Icon = "rbxassetid://10723343321"\n})\n\nMainTab:Section({ Title = "Información" })\n\nMainTab:Button({\n    Title = "Notificar Estado",\n    Desc = "Verifica si el script corre bien",\n    Callback = function()\n        WindUI:Notify({\n            Title = "Sistema",\n            Content = "El script está funcionando perfectamente",\n            Duration = 3\n        })\n    end\n})\n\n-- [[ PESTAÑA DE SALTO (JUMP) ]] --\nlocal JumpTab = Window:Tab({\n    Title = "Movimiento",\n    Icon = "rbxassetid://10723343321"\n})\n\nJumpTab:Section({ Title = "Controles de Salto" })\n\nJumpTab:Slider({\n    Title = "Jump Power (Lider)",\n    Min = 50, Max = 500, Default = 50,\n    Callback = function(value)\n        local player = game.Players.LocalPlayer\n        if player.Character and player.Character:FindFirstChild("Humanoid") then\n            player.Character.Humanoid.UseJumpPower = true\n            player.Character.Humanoid.JumpPower = value\n        end\n    end\n})\n\nlocal InfiniteJumpEnabled = false\nJumpTab:Toggle({\n    Title = "Salto Infinito",\n    Value = false,\n    Callback = function(state)\n        InfiniteJumpEnabled = state\n    end\n})\n\ngame:GetService("UserInputService").JumpRequest:Connect(function()\n    if InfiniteJumpEnabled then\n        local player = game.Players.LocalPlayer\n        if player.Character and player.Character:FindFirstChildOfClass("Humanoid") then\n            player.Character:FindFirstChildOfClass("Humanoid"):ChangeState("Jumping")\n        end\n    end\n})\n\nWindUI:Notify({\n    Title = "Bienvenido",\n    Content = "Interfaz cargada con éxito",\n    Duration = 5\n})`
        };

        function changeSection(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            const showBox = showEl.querySelector('div');

            hideEl.classList.add('opacity-0', 'scale-90', 'blur-xl');
            setTimeout(() => {
                hideEl.classList.add('hidden');
                showEl.classList.remove('hidden');
                setTimeout(() => {
                    showBox.classList.remove('opacity-0', 'translate-y-10');
                    showBox.classList.add('opacity-100', 'translate-y-0');
                }, 50);
            }, 800);
        }

        function validateKey() {
            if(document.getElementById('key-input').value === "890") {
                changeSection('section-key', 'section-panel');
            } else { alert("Key Incorrecta"); }
        }

        function showKey() { document.getElementById('key-input').value = "890"; }

        function openScriptBox(type) {
            const modal = document.getElementById('modal-script');
            const content = document.getElementById('modal-content');
            document.getElementById('lua-code').value = scripts[type];
            document.getElementById('script-title').innerText = type === 'premium' ? 'Premium_Script.lua' : 'Base_Script.lua';
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-90', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeScriptBox() {
            const content = document.getElementById('modal-content');
            content.classList.add('scale-90', 'opacity-0');
            setTimeout(() => document.getElementById('modal-script').classList.add('hidden'), 500);
        }

        function copyToClipboard() {
            const copyText = document.getElementById("lua-code");
            const btn = document.getElementById("btn-copy");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            btn.innerText = "¡Copiado!";
            btn.classList.replace('bg-white', 'bg-emerald-500');
            btn.classList.add('text-white');
            setTimeout(() => {
                btn.innerText = "Copiar Script";
                btn.classList.replace('bg-emerald-500', 'bg-white');
                btn.classList.remove('text-white');
            }, 2000);
        }

        window.onload = () => {
            const intro = document.getElementById('section-intro');
            intro.classList.remove('opacity-0', 'scale-95', 'blur-md');
            intro.classList.add('opacity-100', 'scale-100', 'blur-0');
        };
    </script>
</body>
</html>
